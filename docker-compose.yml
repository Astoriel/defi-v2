version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: defi_v2_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: defi_v2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d defi_v2" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
